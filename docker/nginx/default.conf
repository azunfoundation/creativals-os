upstream backend_php {
    server backend:9000;
}

upstream frontend_next {
    server frontend:3000;
}

upstream reverb_ws {
    server reverb:8080;
}

server {
    listen 80;
    server_name localhost creativals.local;

    # Redirect HTTP to HTTPS in production
    # return 301 https://$server_name$request_uri;

    client_max_body_size 50M;

    # ─── API (Laravel) ───────────────────────────────────────
    location /api {
        root /var/www/backend/public;
        try_files $uri $uri/ /index.php?$query_string;

        location ~ \.php$ {
            fastcgi_pass backend_php;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME /var/www/backend/public$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_read_timeout 300;
        }
    }

    location /sanctum {
        root /var/www/backend/public;
        try_files $uri $uri/ /index.php?$query_string;

        location ~ \.php$ {
            fastcgi_pass backend_php;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME /var/www/backend/public$fastcgi_script_name;
            include fastcgi_params;
        }
    }

    # ─── WebSocket (Reverb) ──────────────────────────────────
    location /app {
        proxy_pass http://reverb_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60;
    }

    # ─── Frontend (Next.js) ──────────────────────────────────
    location / {
        proxy_pass http://frontend_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ─── Security Headers ────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
