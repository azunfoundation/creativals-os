# ─────────────────────────────────────────────────────────────
# Creativals OS — Oracle Cloud Production Nginx Config
# Place this at: /etc/nginx/sites-available/creativals
# Then: sudo ln -s /etc/nginx/sites-available/creativals /etc/nginx/sites-enabled/
# Test:  sudo nginx -t
# Reload: sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name 140.245.231.188.nip.io;

    client_max_body_size 50M;

    root /var/www/creativals/backend/public;
    index index.php;

    # ─── Health check (no auth) ──────────────────────────────
    location = /up {
        try_files $uri /index.php?$query_string;
        location ~ \.php$ {
            fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
        }
    }

    # ─── API (Laravel) ──────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # ─── Security headers ────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── CORS pre-flight pass-through ───────────────────────
    # Laravel handles CORS via the fruitcake/cors package.
    # Do NOT add nginx-level CORS here — it would double-set headers.

    # ─── Static assets ──────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # ─── Deny dotfiles ──────────────────────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ─── Storage symlink ────────────────────────────────────
    # Run: php artisan storage:link  (once on first deploy)
    location /storage {
        alias /var/www/creativals/backend/storage/app/public;
    }
}
