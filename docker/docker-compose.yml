version: "3.9"

services:
  # ─── PostgreSQL 16 ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: creativals_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-creativals_os}
      POSTGRES_USER: ${POSTGRES_USER:-creativals}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - creativals_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-creativals}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 7 ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: creativals_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - creativals_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Laravel API ────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/php/Dockerfile
    container_name: creativals_backend
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ../backend:/var/www/backend
      - ./php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - creativals_network

  # ─── Laravel Reverb (WebSockets) ────────────────────────────
  reverb:
    build:
      context: ../backend
      dockerfile: ../docker/php/Dockerfile
    container_name: creativals_reverb
    restart: unless-stopped
    working_dir: /var/www/backend
    command: php artisan reverb:start --host=0.0.0.0 --port=8080 --debug
    volumes:
      - ../backend:/var/www/backend
    ports:
      - "8080:8080"
    depends_on:
      - backend
      - redis
    networks:
      - creativals_network

  # ─── Laravel Horizon (Queue Worker) ─────────────────────────
  horizon:
    build:
      context: ../backend
      dockerfile: ../docker/php/Dockerfile
    container_name: creativals_horizon
    restart: unless-stopped
    working_dir: /var/www/backend
    command: php artisan horizon
    volumes:
      - ../backend:/var/www/backend
    depends_on:
      - backend
      - redis
    networks:
      - creativals_network

  # ─── Laravel Scheduler ──────────────────────────────────────
  scheduler:
    build:
      context: ../backend
      dockerfile: ../docker/php/Dockerfile
    container_name: creativals_scheduler
    restart: unless-stopped
    working_dir: /var/www/backend
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    volumes:
      - ../backend:/var/www/backend
    depends_on:
      - backend
    networks:
      - creativals_network

  # ─── Next.js Frontend ───────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/node/Dockerfile
    container_name: creativals_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost/api/v1}
      - NEXT_PUBLIC_REVERB_HOST=${NEXT_PUBLIC_REVERB_HOST:-localhost}
      - NEXT_PUBLIC_REVERB_PORT=${NEXT_PUBLIC_REVERB_PORT:-8080}
    depends_on:
      - backend
    networks:
      - creativals_network

  # ─── Nginx Reverse Proxy ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: creativals_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ../backend/public:/var/www/backend/public
    depends_on:
      - backend
      - frontend
    networks:
      - creativals_network

networks:
  creativals_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
